name: 📱 Flutter Builds

on:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - target: android
            os: ubuntu-latest
          - target: ios
            os: macos-latest
          - target: web
            os: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ---------- CACHE ----------
      - name: Cache Flutter SDK + Pub
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ runner.tool_cache }}/flutter
          key: ${{ runner.os }}-flutter-${{ hashFiles('**/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-flutter-

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: build
          key: ${{ runner.os }}-build-${{ matrix.target }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-build-${{ matrix.target }}-

      # ---------- FLUTTER ----------
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.4
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # ---------- ANDROID ----------
      - name: Build Android
        if: matrix.target == 'android'
        run: flutter build apk

      - name: Upload Android build artifacts
        if: matrix.target == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: android-builds
          path: |
            build/app/outputs/flutter-apk/*.apk
            build/app/outputs/bundle/debug/*.aab

      # ---------- IOS ----------
      - name: Build iOS
        if: matrix.target == 'ios'
        run: flutter build ipa --debug --no-codesign

      - name: Upload iOS build artifacts
        if: matrix.target == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: ios-builds
          path: build/ios/ipa/*.ipa

      # ---------- WEB ----------
      - name: Build Web
        if: matrix.target == 'web'
        run: flutter build web --release

      - name: Upload Web artifact (for Pages)
        if: matrix.target == 'web'
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  # ---------- DEPLOY TO GITHUB PAGES ----------
  deploy:
    name: Deploy Web to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy
        uses: actions/deploy-pages@v4
